<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fakeflix — Catálogo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="topbar" id="topbar">
    <div class="topbar__left">
      <a class="brand" href="#" aria-label="Fakeflix Home">
        <span class="brand__dot" aria-hidden="true"></span>
        <span class="brand__text">FAKEFLIX</span>
      </a>

      <nav class="nav" aria-label="Navegación principal">
        <a class="nav__link is-active" href="#">Inicio</a>
      </nav>
    </div>

    <div class="topbar__right" aria-label="Acciones de usuario">
      <div class="search">
        <button class="iconbtn" id="searchToggle" aria-label="Abrir búsqueda" title="Buscar">
          🔍
        </button>
        <input
          id="searchInput"
          class="search__input"
          type="search"
          placeholder="Buscar títulos..."
          autocomplete="off"
          aria-label="Buscar películas"
        />
      </div>
      <button class="iconbtn" aria-label="Notificaciones" title="Notificaciones">🔔</button>
      <button class="avatar" aria-label="Perfil">
        <span class="avatar__img" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main" id="main">
    <div class="main__spacer" aria-hidden="true"></div>
    <div class="sections" id="sections"></div>

    <footer class="footer">
      <p>Fakeflix</p>
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
