<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fakeflix — Catálogo</title>

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <!-- =========================
       HEADER
  ========================== -->
  <header class="topbar" id="topbar">

    <div class="topbar__left">

      <a class="brand" href="#">
        <span class="brand__dot"></span>
        <span class="brand__text">FAKEFLIX</span>
      </a>

      <nav class="nav">
        <a class="nav__link is-active" href="#">Inicio</a>
      </nav>

    </div>

    <div class="topbar__right">

      <div class="search">

        <button class="iconbtn" id="searchToggle">
          🔍
        </button>

        <input
          id="searchInput"
          class="search__input"
          type="search"
          placeholder="Buscar películas..."
        />

      </div>

    </div>

  </header>

  <!-- =========================
       HERO RTVE STYLE
  ========================== -->
  <section class="hero" id="hero">

    <div class="hero__overlay"></div>

    <div class="hero__content">

      <span class="hero__tag">
        PELÍCULA DESTACADA
      </span>

      <h1 class="hero__title" id="heroTitle">
        Los odiosos ocho
      </h1>

      <p class="hero__description" id="heroDescription">
        Descripción película
      </p>

      <div class="hero__buttons">

        <button class="hero__play" id="heroPlay">
          ▶ Ver ahora
        </button>

        <button class="hero__info" id="heroInfo">
          ℹ Más información
        </button>

      </div>

    </div>

  </section>

  <!-- =========================
       MAIN
  ========================== -->
  <main class="main">

    <div class="sections" id="sections"></div>

    <footer class="footer">
      Fakeflix
    </footer>

  </main>

  <script src="./app.js"></script>

</body>
</html>
