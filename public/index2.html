<!doctype html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Fakeflix Player</title>

  <link
    rel="stylesheet"
    href="./styles.css"
  >

</head>

<body>

  <div class="player">

    <!-- =========================
         TOPBAR
    ========================== -->

    <div class="player__top">

      <div class="logo">

        <div class="logo__dot"></div>

        FAKEFLIX

      </div>

      <button
        class="back"
        onclick="history.back()"
      >
        ← Volver
      </button>

    </div>

    <!-- =========================
         VIDEO
    ========================== -->

    <video
      id="movieVideo"
      controls
      autoplay
    >
    </video>

    <div class="shadow"></div>

    <!-- =========================
         INFO
    ========================== -->

    <div class="player__info">

      <h1
        class="player__title"
        id="movieTitle"
      >
        Cargando...
      </h1>

      <p
        class="player__desc"
        id="movieDescription"
      >
        ...
      </p>

    </div>

  </div>

  <script>

    /* =========================
       GET MOVIE ID
    ========================== */

    const params =
    new URLSearchParams(window.location.search);

    const movieId =
    params.get("id");

    /* =========================
       LOAD MOVIE
    ========================== */

    async function loadMovie(){

      try{

        const response =
        await fetch(
          `http://localhost:3000/api/films/${movieId}`
        );

        const movie =
        await response.json();

        document.getElementById("movieTitle")
        .textContent =
        movie.title ||
        movie.original_title;

        document.getElementById("movieDescription")
        .textContent =
        movie.synopsis ||
        movie.overview;

        const video =
        document.getElementById("movieVideo");

        video.innerHTML = `
          <source
            src="${movie.video}"
            type="video/mp4"
          >
        `;

      }catch(error){

        console.error(error);

      }

    }

    loadMovie();

  </script>

</body>

</html>
