<!-- INDEX2.HTML -->
<!doctype html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Fakeflix Player</title>

  <link
    rel="stylesheet"
    href="./styles.css"
  >

</head>

<body>

  <div class="player">

    <div class="player__top">

      <div class="logo">

        <div class="logo__dot"></div>

        FAKEFLIX

      </div>

      <button
        class="back"
        onclick="history.back()"
      >
        ← Volver
      </button>

    </div>

    <!-- VIDEO -->

    <video
      id="movieVideo"
      controls
      autoplay
    ></video>

    <div class="shadow"></div>

    <!-- INFO -->

    <div class="player__info">

      <h1
        class="player__title"
        id="movieTitle"
      >
      </h1>

      <p
        class="player__desc"
        id="movieDescription"
      >
      </p>

    </div>

  </div>

  <script src="./main.js"></script>

</body>

</html>
